<form method="post" action="{% url 'worksheet-edit' entry_id %}">
    {% csrf_token %}
    <div class="form-row">
        {% for field in form %}
            <div class="form-group col-md-6">
                {{ field.label_tag }}
                {{ field }}
                {% if field.errors %}
                    <div class="text-danger small">{{ field.errors.as_text }}</div>
                {% endif %}
            </div>
        {% endfor %}
    </div>
    <div class="d-flex justify-content-end mt-3">
        <a href="{% url 'worksheet' %}" class="btn btn-secondary mr-2">Cancel</a>
        <button type="submit" class="btn btn-primary">Save Changes</button>
    </div>
</form>
