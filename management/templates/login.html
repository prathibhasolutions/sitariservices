{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Login - Sitari Solutions</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            background: #0a0e1a;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* ── Animated background ── */
        .bg-scene {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: radial-gradient(ellipse at 20% 50%, #1a1060 0%, transparent 55%),
                        radial-gradient(ellipse at 80% 20%, #0d2a5e 0%, transparent 50%),
                        radial-gradient(ellipse at 60% 80%, #10184a 0%, transparent 50%),
                        #060b18;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.35;
            animation: drift 14s ease-in-out infinite alternate;
        }
        .orb-1 { width: 520px; height: 520px; background: #3b5bdb; top: -120px; left: -100px; animation-duration: 16s; }
        .orb-2 { width: 400px; height: 400px; background: #1971c2; bottom: -80px; right: -80px; animation-duration: 12s; animation-delay: -4s; }
        .orb-3 { width: 280px; height: 280px; background: #5c7cfa; top: 40%; left: 55%; animation-duration: 18s; animation-delay: -8s; }

        @keyframes drift {
            from { transform: translate(0, 0) scale(1); }
            to   { transform: translate(40px, 30px) scale(1.08); }
        }

        /* ── Top bar ── */
        .top-bar {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 28px;
        }

        .top-bar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            color: rgba(255,255,255,0.85);
            font-weight: 600;
            font-size: 0.95rem;
            text-decoration: none;
        }

        .top-bar-brand img {
            width: 34px; height: 34px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255,255,255,0.3);
        }

        .top-bar-actions {
            display: flex;
            gap: 10px;
        }

        .pill-btn {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 8px 18px;
            border-radius: 999px;
            font-size: 0.82rem;
            font-weight: 600;
            text-decoration: none;
            border: 1px solid rgba(255,255,255,0.22);
            background: rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.88);
            backdrop-filter: blur(8px);
            transition: background 0.2s, border-color 0.2s, transform 0.15s;
        }

        .pill-btn:hover {
            background: rgba(255,255,255,0.18);
            border-color: rgba(255,255,255,0.4);
            color: #fff;
            transform: translateY(-1px);
        }

        /* ── Card ── */
        .login-wrap {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 420px;
            padding: 0 16px;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 24px;
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            box-shadow: 0 32px 80px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255,255,255,0.06) inset;
            overflow: hidden;
        }

        /* ── Card header ── */
        .card-top {
            padding: 36px 36px 28px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .logo-ring {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 86px; height: 86px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4c6ef5, #228be6);
            padding: 3px;
            box-shadow: 0 0 0 6px rgba(76, 110, 245, 0.18), 0 8px 28px rgba(76,110,245,0.4);
            margin-bottom: 18px;
        }

        .logo-ring img {
            width: 80px; height: 80px;
            border-radius: 50%;
            object-fit: cover;
        }

        .card-top h2 {
            color: #fff;
            font-size: 1.45rem;
            font-weight: 700;
            margin: 0 0 4px;
            letter-spacing: -0.02em;
        }

        .card-top p {
            color: rgba(255,255,255,0.45);
            font-size: 0.82rem;
            margin: 0;
        }

        /* ── Form body ── */
        .card-body-inner {
            padding: 30px 36px 36px;
        }

        .field-group {
            margin-bottom: 20px;
        }

        .field-label {
            display: block;
            font-size: 0.78rem;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.5);
            margin-bottom: 8px;
        }

        .field-input-wrap {
            position: relative;
        }

        .field-input-wrap .fi-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #7c9ef5;
            font-size: 0.9rem;
            pointer-events: none;
        }

        .field-input {
            width: 100%;
            padding: 13px 14px 13px 40px;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 12px;
            color: #fff;
            font-size: 0.92rem;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
            outline: none;
        }

        .field-input::placeholder { color: rgba(255,255,255,0.25); }

        .field-input:focus {
            border-color: rgba(76,110,245,0.7);
            background: rgba(76,110,245,0.1);
            box-shadow: 0 0 0 3px rgba(76,110,245,0.2);
        }

        /* password toggle */
        .toggle-pw {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #7c9ef5;
            cursor: pointer;
            padding: 0;
            font-size: 0.9rem;
            transition: color 0.2s;
        }
        .toggle-pw:hover { color: #4c6ef5; }

        /* ── Submit button ── */
        .btn-login {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #4c6ef5 0%, #228be6 100%);
            color: #fff;
            font-size: 0.95rem;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            letter-spacing: 0.02em;
            box-shadow: 0 6px 24px rgba(76,110,245,0.45);
            transition: transform 0.15s, box-shadow 0.2s, filter 0.2s;
            margin-top: 6px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 32px rgba(76,110,245,0.55);
            filter: brightness(1.07);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        /* ── Alerts ── */
        .login-alert {
            margin-top: 16px;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 500;
            background: rgba(220, 53, 69, 0.18);
            border: 1px solid rgba(220, 53, 69, 0.38);
            color: #ff8a8a;
            display: flex;
            align-items: center;
            gap: 8px;
        }
    </style>
</head>
<body>
    <div class="bg-scene">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <!-- Top Bar -->
    <div class="top-bar">
        <a href="https://www.sitarisolutions.in" class="top-bar-brand">
            <img src="{% static 'management/img/logo.jpg' %}" alt="Logo">
            Sitari Solutions
        </a>
        <div class="top-bar-actions">
            <a href="{% url 'admin_dashboard' %}" class="pill-btn">
                <i class="fas fa-tachometer-alt"></i> Admin Dashboard
            </a>
            <a href="/admin/" class="pill-btn">
                <i class="fas fa-user-shield"></i> Admin Login
            </a>
        </div>
    </div>

    <!-- Login Card -->
    <div class="login-wrap">
        <div class="login-card">
            <div class="card-top">
                <div class="logo-ring">
                    <img src="{% static 'management/img/logo.jpg' %}" alt="Company Logo">
                </div>
                <h2>Welcome back</h2>
                <p>Sign in to your Sitari Solutions portal</p>
            </div>

            <div class="card-body-inner">
                <form method="post" novalidate>
                    {% csrf_token %}

                    <div class="field-group">
                        <label class="field-label">Mobile Number</label>
                        <div class="field-input-wrap">
                            <i class="fas fa-mobile-alt fi-icon"></i>
                            <input type="text" name="mobile" class="field-input" id="mobile"
                                   placeholder="Enter your mobile number" required
                                   value="{{ mobile|default:'' }}" autocomplete="username">
                        </div>
                    </div>

                    <div class="field-group">
                        <label class="field-label">Password</label>
                        <div class="field-input-wrap">
                            <i class="fas fa-lock fi-icon"></i>
                            <input type="password" name="password" class="field-input" id="password"
                                   placeholder="Enter your password" required autocomplete="current-password">
                            <button type="button" class="toggle-pw" id="togglePw" tabindex="-1">
                                <i class="fas fa-eye" id="eyeIcon"></i>
                            </button>
                        </div>
                    </div>

                    <button type="submit" class="btn-login">
                        <i class="fas fa-arrow-right-to-bracket"></i>
                        Sign In
                    </button>
                </form>

                {% if messages %}
                    {% for message in messages %}
                    <div class="login-alert">
                        <i class="fas fa-circle-exclamation"></i>
                        {{ message }}
                    </div>
                    {% endfor %}
                {% endif %}
            </div>
        </div>
    </div>

    <script>
        const togglePw = document.getElementById('togglePw');
        const pwField  = document.getElementById('password');
        const eyeIcon  = document.getElementById('eyeIcon');
        togglePw.addEventListener('click', function () {
            const isText = pwField.type === 'text';
            pwField.type = isText ? 'password' : 'text';
            eyeIcon.className = isText ? 'fas fa-eye' : 'fas fa-eye-slash';
        });
    </script>
</body>
</html>
