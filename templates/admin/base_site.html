{% extends "admin/base_site.html" %}
{% load static %}
{% block extrahead %}
{{ block.super }}
<link rel="manifest" href="{% url 'pwa_manifest' %}">
<meta name="theme-color" content="#0a4a8a">
<link rel="apple-touch-icon" href="{% static 'management/img/logo.jpg' %}">
<script src="{% static 'pwa/register-sw.js' %}" defer></script>
<script>
// Print event tracking for audit log
function logPrintEvent() {
    fetch('/admin/auditlog/print-event/', {
        method: 'POST',
        headers: {
            'X-CSRFToken': (document.querySelector('[name=csrfmiddlewaretoken]') || {}).value || '',
        },
        credentials: 'same-origin'
    });
}
document.addEventListener('keydown', function(e) {
    if ((e.ctrlKey || e.metaKey) && e.key === 'p') {
        logPrintEvent();
    }
});
window.onafterprint = function() {
    logPrintEvent();
};
</script>
{% endblock %}
